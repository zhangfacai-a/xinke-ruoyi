<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" type="image/png" href="/src/assets/logo/logo.png">
  <title>%VITE_APP_TITLE%</title>
  <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
  <style>
    html,
    body,
    #app {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7ff;
    }

    .chromeframe {
      margin: 0.2em 0;
      background: #ccc;
      color: #000;
      padding: 0.2em 0;
    }

    #loader-wrapper {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(162, 155, 254, 0.34), transparent 30%),
        radial-gradient(circle at 82% 20%, rgba(108, 92, 231, 0.18), transparent 28%),
        linear-gradient(135deg, #f8f9ff 0%, #eef1fb 100%);
    }

    #loader-wrapper::before,
    #loader-wrapper::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(8px);
    }

    #loader-wrapper::before {
      top: 8%;
      right: 8%;
      background: linear-gradient(135deg, rgba(108, 92, 231, 0.2), rgba(162, 155, 254, 0.12));
    }

    #loader-wrapper::after {
      left: 7%;
      bottom: 6%;
      background: linear-gradient(135deg, rgba(82, 113, 255, 0.14), rgba(108, 92, 231, 0.08));
    }

    .boot-card {
      position: relative;
      z-index: 1;
      width: min(380px, calc(100vw - 48px));
      min-height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 28px 80px rgba(55, 62, 97, 0.14), inset 0 0 0 1px rgba(255, 255, 255, 0.64);
      backdrop-filter: blur(22px);
    }

    .loader {
      width: 40px;
      height: 50px;
      transform: scale(2.8);
      transform-origin: center;
      margin-bottom: 62px;
    }

    .box {
      position: relative;
      left: 10px;
      opacity: 0;
    }

    .side-left,
    .side-right {
      position: absolute;
      top: 14px;
      width: 19px;
      height: 5px;
      border-radius: 1px;
    }

    .side-left {
      left: 10px;
      background: #6c5ce7;
      transform: skew(0deg, -25deg);
    }

    .side-right {
      left: -9px;
      background: #8b7ff2;
      transform: skew(0deg, 25deg);
    }

    .side-top {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 2px;
      background: #a29bfe;
      rotate: 45deg;
      transform: skew(-20deg, -20deg);
      box-shadow: 0 8px 18px rgba(108, 92, 231, 0.22);
    }

    .box-1 {
      animation: from-left 4s infinite;
    }

    .box-2 {
      animation: from-right 4s infinite;
      animation-delay: 1s;
    }

    .box-3 {
      animation: from-left 4s infinite;
      animation-delay: 2s;
    }

    .box-4 {
      animation: from-right 4s infinite;
      animation-delay: 3s;
    }

    .load-title {
      margin: 0;
      color: #202437;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .load-subtitle {
      margin: 10px 0 0;
      color: #8a91a6;
      font-size: 13px;
    }

    .load-progress {
      width: 160px;
      height: 4px;
      margin-top: 24px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(108, 92, 231, 0.12);
    }

    .load-progress::before {
      content: "";
      display: block;
      width: 48%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #6c5ce7, #a29bfe);
      animation: progress-slide 1.5s ease-in-out infinite;
    }

    @keyframes from-left {
      0% {
        z-index: 20;
        opacity: 0;
        translate: -20px -6px;
      }

      20% {
        z-index: 10;
        opacity: 1;
        translate: 0 0;
      }

      40% {
        z-index: 9;
        translate: 0 4px;
      }

      60% {
        z-index: 8;
        translate: 0 8px;
      }

      80% {
        z-index: 7;
        opacity: 1;
        translate: 0 12px;
      }

      100% {
        z-index: 5;
        translate: 0 30px;
        opacity: 0;
      }
    }

    @keyframes from-right {
      0% {
        z-index: 20;
        opacity: 0;
        translate: 20px -6px;
      }

      20% {
        z-index: 10;
        opacity: 1;
        translate: 0 0;
      }

      40% {
        z-index: 9;
        translate: 0 4px;
      }

      60% {
        z-index: 8;
        translate: 0 8px;
      }

      80% {
        z-index: 7;
        opacity: 1;
        translate: 0 12px;
      }

      100% {
        z-index: 5;
        translate: 0 30px;
        opacity: 0;
      }
    }

    @keyframes progress-slide {
      0% {
        transform: translateX(-120%);
      }

      55% {
        transform: translateX(72%);
      }

      100% {
        transform: translateX(230%);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .box,
      .load-progress::before {
        animation: none;
      }

      .box-1 {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="loader-wrapper">
      <div class="boot-card">
        <div class="loader" aria-hidden="true">
          <div class="box box-1">
            <div class="side-left"></div>
            <div class="side-right"></div>
            <div class="side-top"></div>
          </div>
          <div class="box box-2">
            <div class="side-left"></div>
            <div class="side-right"></div>
            <div class="side-top"></div>
          </div>
          <div class="box box-3">
            <div class="side-left"></div>
            <div class="side-right"></div>
            <div class="side-top"></div>
          </div>
          <div class="box box-4">
            <div class="side-left"></div>
            <div class="side-right"></div>
            <div class="side-top"></div>
          </div>
        </div>
        <p class="load-title">Xinke ERP</p>
        <p class="load-subtitle">正在加载企业经营系统</p>
        <div class="load-progress"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
